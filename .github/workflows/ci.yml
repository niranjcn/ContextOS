# ==============================================================================
# ContextOS — GitHub Actions CI/CD Pipeline
# ==============================================================================
# Alternative to the Jenkinsfile — runs on GitHub's hosted runners.
# Free for public repos, 2000 min/month for private repos.
#
# Triggers:
#   - Push to main or develop → full pipeline
#   - Pull request to main → test + lint only (no deploy)
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   - AWS_ACCESS_KEY_ID:     IAM user access key for ECR/EKS
#   - AWS_SECRET_ACCESS_KEY: IAM user secret key
#   - AWS_REGION:            e.g., us-east-1
#   - ECR_REGISTRY:          e.g., 123456789.dkr.ecr.us-east-1.amazonaws.com
# ==============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ==============================================================================
# Job 1: Test — Run the full pytest suite with coverage
# ==============================================================================
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip packages to speed up subsequent runs.
      # The cache key includes the hash of requirements files — if
      # dependencies change, the cache is invalidated automatically.
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          python -m spacy download en_core_web_sm

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=core \
            --cov-report=xml \
            --cov-report=term-missing

      # Upload coverage to Codecov for PR comments and tracking
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ==============================================================================
  # Job 2: Lint — Code quality checks
  # ==============================================================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install ruff black

      - name: Run ruff linter
        run: ruff check .

      - name: Check black formatting
        run: black --check .

  # ==============================================================================
  # Job 3: Build and Push — Docker images to ECR (main branch only)
  # ==============================================================================
  build-and-push:
    name: Build & Push Docker Images
    # Only run after tests and lint pass
    needs: [test, lint]
    runs-on: ubuntu-latest
    # Only push images on main branch (not PRs or develop)
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate with AWS using GitHub Secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      # Login to ECR — returns the registry URL
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build and push the API image
      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building API image: ${ECR_REGISTRY}/contextos-api:${IMAGE_TAG}"

          docker build \
            -t ${ECR_REGISTRY}/contextos-api:${IMAGE_TAG} \
            -t ${ECR_REGISTRY}/contextos-api:latest \
            .

          docker push ${ECR_REGISTRY}/contextos-api:${IMAGE_TAG}
          docker push ${ECR_REGISTRY}/contextos-api:latest

      # Build and push the dashboard image
      - name: Build and push dashboard image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building dashboard image: ${ECR_REGISTRY}/contextos-dashboard:${IMAGE_TAG}"

          docker build \
            -t ${ECR_REGISTRY}/contextos-dashboard:${IMAGE_TAG} \
            -t ${ECR_REGISTRY}/contextos-dashboard:latest \
            ./dashboard

          docker push ${ECR_REGISTRY}/contextos-dashboard:${IMAGE_TAG}
          docker push ${ECR_REGISTRY}/contextos-dashboard:latest

  # ==============================================================================
  # Job 4: Deploy — Apply Kubernetes manifests (main branch only)
  # ==============================================================================
  deploy:
    name: Deploy to Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    # Only deploy on main branch
    if: github.ref == 'refs/heads/main'
    # Require manual approval in GitHub Environments (optional but recommended)
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      # Configure kubectl to talk to the EKS cluster
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name contextos-cluster \
            --region ${{ secrets.AWS_REGION || 'us-east-1' }}

      # Replace the IMAGE_TAG placeholder in k8s manifests with the
      # actual commit SHA. This ensures the exact code that was tested
      # is what gets deployed (immutable deployments).
      - name: Update image tags in manifests
        run: |
          sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8s/api-deployment.yaml
          sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8s/dashboard-deployment.yaml

      # Apply all Kubernetes manifests
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/ --namespace contextos

      # Wait for the rollout to complete (fails if pods crash-loop)
      - name: Verify API deployment
        run: |
          kubectl rollout status deployment/contextos-api \
            --namespace contextos \
            --timeout=5m

      - name: Verify dashboard deployment
        run: |
          kubectl rollout status deployment/contextos-dashboard \
            --namespace contextos \
            --timeout=2m

      # Smoke test — verify the deployed application is healthy
      - name: Health check
        run: |
          echo "Waiting 30 seconds for pods to stabilize..."
          sleep 30

          # Get the Ingress external IP/hostname
          INGRESS_HOST=$(kubectl get ingress contextos-ingress \
            --namespace contextos \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          echo "Running health check against: ${INGRESS_HOST}"
          curl -f --max-time 15 "https://${INGRESS_HOST}/health" || \
            (echo "Health check failed! Rolling back..." && \
             kubectl rollout undo deployment/contextos-api --namespace contextos && \
             exit 1)
