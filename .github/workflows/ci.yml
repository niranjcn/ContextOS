# ==============================================================================
# ContextOS — GitHub Actions CI Pipeline
# ==============================================================================
#
# Triggers:
#   - Push to main or develop → full pipeline
#   - Pull request to main → test + lint only
# ==============================================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Job 1: Test — Run the full pytest suite with coverage
  # ==========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only torch first to avoid pulling in 2 GB of CUDA packages
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt
          # Install spaCy model via pip URL instead of `spacy download`
          pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.7.1/en_core_web_sm-3.7.1-py3-none-any.whl

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=core \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ==========================================================================
  # Job 2: Lint — Code quality checks
  # ==========================================================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install ruff black

      - name: Run ruff linter
        run: ruff check .

      - name: Check black formatting
        run: black --check .

  # ==========================================================================
  # Job 3: Docker Build — Verify images build correctly
  # ==========================================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: contextos-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          push: false
          tags: contextos-dashboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start services
        run: |
          docker compose up -d
          echo "Waiting for API to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API is healthy!"
              break
            fi
            sleep 5
          done

      - name: Smoke test
        run: |
          STATUS=$(curl -sf http://localhost:8000/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))")
          echo "Health status: $STATUS"
          if [ "$STATUS" != "healthy" ]; then
            echo "Health check failed!"
            docker compose logs api
            exit 1
          fi
          echo "Smoke test passed."

      - name: Stop services
        if: always()
        run: docker compose down -v
