# ==============================================================================
# ContextOS Dashboard — Nginx Configuration
# ==============================================================================
# This config does four things:
#   1. Serves the React SPA (with fallback to index.html for client-side routing)
#   2. Proxies /api/* requests to the backend API container
#   3. Enables gzip compression (saves bandwidth)
#   4. Sets browser caching headers for static assets (faster repeat visits)
# ==============================================================================

server {
    listen 80;
    server_name _;  # Respond to any hostname (Docker doesn't use DNS names internally)

    # Root directory where the built React app lives
    root /usr/share/nginx/html;
    index index.html;

    # --------------------------------------------------------------------------
    # Gzip Compression
    # --------------------------------------------------------------------------
    # Compresses responses before sending them to the browser.
    # Typically reduces JS/CSS size by 60-80%.
    gzip on;
    gzip_vary on;                         # Tell proxies to cache gzipped and non-gzipped versions separately
    gzip_proxied any;                     # Compress even for proxied requests
    gzip_comp_level 6;                    # Compression level 1-9 (6 is a good speed/ratio balance)
    gzip_min_length 256;                  # Don't bother compressing tiny files
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;                    # SVGs compress very well

    # --------------------------------------------------------------------------
    # API Reverse Proxy
    # --------------------------------------------------------------------------
    # Forward /api/* requests to the FastAPI backend container.
    # The "api" hostname resolves via Docker Compose's internal DNS.
    location /api/ {
        # Rewrite strips the /api prefix: /api/health → /health
        # This means the FastAPI app doesn't need to know about the /api prefix.
        rewrite ^/api/(.*) /$1 break;

        proxy_pass http://api:8000;

        # Pass the original client information to the backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for real-time features if added later)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Increase timeout for long-running LLM queries
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # --------------------------------------------------------------------------
    # Static Asset Caching
    # --------------------------------------------------------------------------
    # Vite adds content hashes to filenames (e.g., index-a1b2c3.js),
    # so it's safe to cache aggressively — the filename changes when content changes.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;                       # Cache for 1 year
        add_header Cache-Control "public, immutable";  # "immutable" tells browsers: don't even revalidate
        access_log off;                   # Don't log static asset requests (reduces noise)
    }

    # --------------------------------------------------------------------------
    # React Router SPA Fallback
    # --------------------------------------------------------------------------
    # React Router uses client-side routing (e.g., /settings, /graph).
    # When the user refreshes on /settings, nginx would return 404 because
    # there's no /settings file on disk. This rule falls back to index.html,
    # which loads React, which reads the URL and renders the right component.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --------------------------------------------------------------------------
    # Security: Block dotfiles
    # --------------------------------------------------------------------------
    # Prevent access to .env, .git, etc. that might accidentally end up
    # in the served directory.
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
