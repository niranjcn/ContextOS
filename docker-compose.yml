# ==============================================================================
# ContextOS — Docker Compose
# ==============================================================================
# One-command local deployment for the full ContextOS stack.
#
# Usage:
#   docker compose up -d              # Start everything
#   docker compose logs -f api        # Follow API logs
#   docker compose down               # Stop everything
#   docker compose down -v            # Stop + delete data volumes
# ==============================================================================

services:

  # --------------------------------------------------------------------------
  # Ollama — Local LLM inference server
  # --------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: contextos-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Model Puller — One-shot init container
  # --------------------------------------------------------------------------
  # Downloads the LLM model into Ollama, exits when done.
  # The API waits for this to finish before starting.
  model-puller:
    image: ollama/ollama:latest
    container_name: contextos-model-puller
    depends_on:
      ollama:
        condition: service_healthy
    command: ollama pull ${OLLAMA_MODEL:-llama3.2}
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # --------------------------------------------------------------------------
  # API — ContextOS FastAPI Backend
  # --------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contextos-api
    depends_on:
      ollama:
        condition: service_healthy
      model-puller:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - CHROMA_DB_PATH=/data/chroma
      - ENABLE_GMAIL=${ENABLE_GMAIL:-false}
      - ENABLE_ENCRYPTION=${ENABLE_ENCRYPTION:-false}
    volumes:
      - contextos_data:/data
      - ./secrets:/app/secrets:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Dashboard — React Frontend (served by nginx)
  # --------------------------------------------------------------------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: contextos-dashboard
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped

# ==============================================================================
# Named Volumes
# ==============================================================================
volumes:
  ollama_data:
    driver: local
  contextos_data:
    driver: local
