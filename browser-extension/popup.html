<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ContextOS Capture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1f2937;
      background: #f9fafb;
      width: 360px;
      max-height: 500px;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 500px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #4f46e5;
      color: #fff;
    }
    header h1 { font-size: 15px; font-weight: 600; }
    #statusDot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; margin-right: 6px;
    }
    #statusDot.online { background: #34d399; }
    #statusDot.offline { background: #f87171; }
    #statusDot.checking { background: #fbbf24; }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
    }
    .controls label {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      user-select: none;
    }
    .controls button {
      margin-left: auto;
      padding: 5px 10px;
      font-size: 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .controls button:hover { background: #4338ca; }
    .controls button:disabled { background: #9ca3af; cursor: default; }

    .settings-row {
      display: flex;
      gap: 6px;
      padding: 8px 14px;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
    }
    .settings-row input {
      flex: 1;
      padding: 4px 8px;
      font-size: 12px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      outline: none;
    }
    .settings-row input:focus { border-color: #4f46e5; }

    #capturesSection {
      flex: 1;
      overflow-y: auto;
      padding: 8px 14px;
    }
    #capturesSection h3 {
      font-size: 12px;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }
    #capturesList { list-style: none; }
    .capture-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .capture-item:last-child { border-bottom: none; }
    .capture-info { flex: 1; min-width: 0; }
    .capture-title {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .capture-url {
      font-size: 11px;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .capture-time { font-size: 10px; color: #9ca3af; margin-top: 2px; }
    .capture-status { font-size: 16px; }
    .capture-status.sent { color: #34d399; }
    .capture-status.pending { color: #fbbf24; }
    .capture-status.error { color: #f87171; }

    .empty-state {
      text-align: center;
      padding: 40px 14px;
      color: #9ca3af;
    }
    .empty-state p { margin-top: 6px; font-size: 12px; }

    #clearBtn {
      padding: 3px 8px;
      font-size: 11px;
      background: transparent;
      color: #ef4444;
      border: 1px solid #fca5a5;
      border-radius: 3px;
      cursor: pointer;
      margin-left: auto;
    }
    #clearBtn:hover { background: #fef2f2; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>ContextOS</h1>
      <span><span id="statusDot" class="checking"></span><span id="statusLabel">checking</span></span>
    </header>

    <div class="controls">
      <label>
        <input type="checkbox" id="autoCapture" checked />
        Auto-capture
      </label>
      <button id="clearBtn" title="Clear capture history">Clear</button>
      <button id="captureNow">Capture now</button>
    </div>

    <div class="settings-row">
      <input type="text" id="apiUrl" placeholder="http://localhost:8000" />
    </div>

    <div id="capturesSection">
      <h3>Recent Captures</h3>
      <ul id="capturesList"></ul>
      <div class="empty-state" id="emptyState">
        <div style="font-size: 32px;">&#128225;</div>
        <p>No pages captured yet.<br />Browse the web and pages will appear here.</p>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
