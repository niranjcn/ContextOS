# ==============================================================================
# ContextOS — Ollama Deployment, Service, PVC, and Init Job
# ==============================================================================
# Ollama is the local LLM inference server. It's stateful (stores downloaded
# models on disk), so it gets a PersistentVolumeClaim and runs as a single
# replica. Auto-scaling Ollama isn't practical because model loading takes
# minutes and each replica needs its own copy of the model weights.
# ==============================================================================

---
# --------------------------------------------------------------------------
# PersistentVolumeClaim — Storage for downloaded LLM models
# --------------------------------------------------------------------------
# llama3.2 is ~2GB, but we allocate 20Gi to allow downloading multiple
# models or larger ones (e.g., llama3.1:70b is ~40GB).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: contextos
  labels:
    app: contextos
    component: ollama
spec:
  accessModes:
    # ReadWriteOnce = only one node can mount this volume at a time.
    # Fine for Ollama since we only run 1 replica.
    - ReadWriteOnce
  # gp3 is AWS EBS's latest general-purpose SSD — 20% cheaper than gp2
  # with better baseline performance (3000 IOPS, 125 MiB/s).
  storageClassName: gp3
  resources:
    requests:
      storage: 20Gi

---
# --------------------------------------------------------------------------
# Deployment — Ollama LLM Server
# --------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: contextos
  labels:
    app: contextos
    component: ollama
spec:
  # Single replica — Ollama is stateful and model loading is expensive.
  # Scaling Ollama horizontally requires shared storage or model caching,
  # which adds complexity without proportional benefit for most workloads.
  replicas: 1
  selector:
    matchLabels:
      app: contextos
      component: ollama
  template:
    metadata:
      labels:
        app: contextos
        component: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: http
              protocol: TCP
          resources:
            requests:
              # Minimum resources Kubernetes guarantees to this pod.
              # 4Gi RAM is needed to load even small models like llama3.2.
              memory: "4Gi"
              cpu: "1"
            limits:
              # Maximum resources — pod gets OOM-killed if it exceeds memory.
              # 8Gi allows headroom for larger models and concurrent requests.
              memory: "8Gi"
              cpu: "4"
          volumeMounts:
            - name: ollama-storage
              # Ollama stores downloaded models in ~/.ollama
              mountPath: /root/.ollama
          # Liveness probe — restart the container if Ollama becomes unresponsive
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          # Readiness probe — don't route traffic until Ollama is ready
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: ollama-storage
          persistentVolumeClaim:
            claimName: ollama-pvc

---
# --------------------------------------------------------------------------
# Service — Internal DNS entry for Ollama
# --------------------------------------------------------------------------
# Other pods connect to Ollama via http://ollama-service:11434
# ClusterIP = only accessible inside the cluster (not from the internet).
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: contextos
  labels:
    app: contextos
    component: ollama
spec:
  type: ClusterIP
  selector:
    app: contextos
    component: ollama
  ports:
    - port: 11434
      targetPort: 11434
      protocol: TCP
      name: http

---
# --------------------------------------------------------------------------
# Job — One-shot model puller (runs once after Ollama is deployed)
# --------------------------------------------------------------------------
# Downloads the llama3.2 model into Ollama. The Job controller ensures
# this runs to completion exactly once, even if the pod is rescheduled.
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-model-pull
  namespace: contextos
  labels:
    app: contextos
    component: ollama-init
spec:
  # Don't retry more than 3 times if pulling fails (e.g., network issues)
  backoffLimit: 3
  # Automatically clean up the completed Job after 1 hour
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: contextos
        component: ollama-init
    spec:
      containers:
        - name: model-puller
          image: ollama/ollama:latest
          command: ["ollama", "pull", "llama3.2"]
          env:
            # Point the Ollama CLI at the running Ollama server
            - name: OLLAMA_HOST
              value: "http://ollama-service:11434"
      # Never restart — the Job controller handles retries via backoffLimit
      restartPolicy: Never
