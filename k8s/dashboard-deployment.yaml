# ==============================================================================
# ContextOS — Dashboard Deployment, Service, and Ingress
# ==============================================================================
# The React dashboard is served as static files by nginx. It's stateless,
# lightweight, and easy to scale. The Ingress controller handles TLS
# termination and routes traffic to the dashboard and API services.
# ==============================================================================

---
# --------------------------------------------------------------------------
# Deployment — React Dashboard (served by nginx)
# --------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: contextos-dashboard
  namespace: contextos
  labels:
    app: contextos
    component: dashboard
spec:
  # 2 replicas for availability — nginx is so lightweight that 2 replicas
  # use barely any resources but provide redundancy.
  replicas: 2
  selector:
    matchLabels:
      app: contextos
      component: dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: contextos
        component: dashboard
    spec:
      containers:
        - name: dashboard
          # IMPORTANT: Replace YOUR_REGISTRY with your actual ECR URL.
          # Example: 123456789.dkr.ecr.us-east-1.amazonaws.com/contextos-dashboard
          image: YOUR_REGISTRY/contextos-dashboard:IMAGE_TAG  # Replace with your ECR URL
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          resources:
            requests:
              # nginx serving static files needs almost nothing
              memory: "128Mi"
              cpu: "100m"   # 0.1 CPU cores
            limits:
              memory: "256Mi"
              cpu: "500m"
          # Simple liveness check — nginx should always respond to /
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

---
# --------------------------------------------------------------------------
# Service — Internal DNS entry for the Dashboard
# --------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: contextos
  labels:
    app: contextos
    component: dashboard
spec:
  type: ClusterIP
  selector:
    app: contextos
    component: dashboard
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http

---
# --------------------------------------------------------------------------
# Ingress — External access with TLS and path-based routing
# --------------------------------------------------------------------------
# The Ingress controller (nginx-ingress) sits at the edge of the cluster
# and routes incoming HTTPS traffic to the right Service based on the URL path.
#
# Prerequisites:
#   1. Install nginx-ingress: helm install ingress-nginx ingress-nginx/ingress-nginx
#   2. Install cert-manager: helm install cert-manager jetstack/cert-manager
#   3. Create a ClusterIssuer for Let's Encrypt (free TLS certificates)
#   4. Point your DNS (contextos.yourdomain.com) to the Ingress controller's
#      external IP/load balancer address
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: contextos-ingress
  namespace: contextos
  labels:
    app: contextos
  annotations:
    # Tell Kubernetes which Ingress controller should handle this Ingress
    kubernetes.io/ingress.class: nginx
    # cert-manager automatically provisions and renews TLS certificates
    # from Let's Encrypt when this annotation is present
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Increase max upload size for file ingestion (default is 1MB)
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # Increase timeout for long-running LLM queries
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  # TLS configuration — cert-manager will create and manage this Secret
  tls:
    - hosts:
        - contextos.yourdomain.com  # REPLACE with your actual domain
      secretName: contextos-tls     # cert-manager stores the cert here
  rules:
    - host: contextos.yourdomain.com  # REPLACE with your actual domain
      http:
        paths:
          # API routes — /api/* goes to the FastAPI backend
          # pathType: Prefix means /api, /api/query, /api/health all match
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8000
          # Dashboard — everything else goes to the React frontend
          # The / path with Prefix type is a catch-all
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard-service
                port:
                  number: 80
