# ==============================================================================
# ContextOS — Kubernetes Secret (TEMPLATE — DO NOT COMMIT REAL VALUES)
# ==============================================================================
# This file contains BASE64-ENCODED PLACEHOLDER values only.
# Replace them with your actual secrets before applying.
#
# How to generate base64 values:
#   echo -n 'your-actual-secret-key' | base64
#
# SECURITY WARNING:
#   - NEVER commit real secrets to version control
#   - In production, use external-secrets-operator with AWS Secrets Manager
#     or HashiCorp Vault instead of storing secrets in YAML files
#   - Consider using sealed-secrets (Bitnami) for GitOps workflows
# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: contextos-secrets
  namespace: contextos
  labels:
    app: contextos
# Opaque is the default Secret type for arbitrary key-value pairs
type: Opaque
data:
  # Encryption key used by ContextOS to encrypt user data at rest.
  # The value below is a base64-encoded placeholder: "CHANGE-ME-generate-a-real-key"
  # Generate a real key: openssl rand -base64 32
  # Then encode it: echo -n '<your-generated-key>' | base64
  CONTEXTOS_ENCRYPTION_KEY: Q0hBTkdFLU1FLWdlbmVyYXRlLWEtcmVhbC1rZXk=
